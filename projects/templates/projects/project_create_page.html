{% extends 'base.html' %}
{% block title %}Add Project - CRM{% endblock %}
{% block breadcrumb %}Add Project{% endblock %}
{% block content %}
<div style="max-width: 1080px; width: 100%; margin-left: auto; margin-right: auto;">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">New Project</h1>
        <a href="{% url 'core:dashboard' %}" class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-colors">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            Back to Dashboard
        </a>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-6">
        {% include 'projects/project_form.html' with is_page=True %}
    </div>

    <div class="flex justify-between items-center pt-6">
        <button type="submit" form="project-create-form"
            class="px-4 py-2.5 bg-green-500 hover:bg-green-600 rounded-[20px] text-white shadow-[0_2px_2px_rgba(0,0,0,0.25)] text-[14px] font-medium transition-colors">
            Create
        </button>
        <a href="{% url 'core:dashboard' %}"
            class="px-4 py-2.5 text-[#666] bg-gray-100 hover:bg-gray-200 transition-colors text-[14px]">
            Cancel
        </a>
    </div>
</div>
{% endblock %}
