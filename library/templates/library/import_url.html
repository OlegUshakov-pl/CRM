{% extends 'base.html' %}
{% block title %}Import URL - Library{% endblock %}
{% block breadcrumb %}Library / Import URL{% endblock %}
{% block content %}
<div class="mx-auto max-w-2xl">
    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700">
        <div class="p-6 border-b border-gray-100 dark:border-gray-700">
            <h1 class="text-xl font-bold text-gray-900 dark:text-white">Import from URL</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Extract content from a web page and save it to your library</p>
        </div>
        <form method="post" class="p-6 space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">URL to Import</label>
                <input type="url" name="url" value="{{ url|default:'' }}" required placeholder="https://example.com/article" class="w-full px-4 py-2.5 border border-[#e8e8e8] text-[14px] outline-none focus:border-violet-300 transition-colors">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Category</label>
                <select name="category" class="w-full px-4 py-2.5 border border-[#e8e8e8] text-[14px] outline-none focus:border-violet-300 transition-colors">
                    <option value="">Select category (optional)</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tags</label>
                <input type="text" name="tags_input" placeholder="Enter tags separated by commas" class="w-full px-4 py-2.5 border border-[#e8e8e8] text-[14px] outline-none focus:border-violet-300 transition-colors">
            </div>

            <div class="flex gap-3 pt-2">
                <button type="submit" class="inline-flex items-center gap-2 px-4 py-2.5 bg-violet-500 hover:bg-violet-600 rounded-[20px] text-white shadow-[0_2px_2px_rgba(0,0,0,0.25)] text-[14px] font-medium transition-colors">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    Import
                </button>
                <a href="{% url 'library:list' %}" class="px-4 py-2.5 text-[#666] bg-gray-100 hover:bg-gray-200 transition-colors text-[14px] rounded-[20px]">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
