<div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-6">
    <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">{{ title }}</h2>
    <form hx-post="{% url 'library:category_create' %}" hx-target="#categories-container" hx-swap="innerHTML" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Name</label>
            <input type="text" name="name" value="{{ form.name.value|default:'' }}" required placeholder="Category name" class="w-full px-4 py-2.5 border border-[#e8e8e8] text-[14px] outline-none focus:border-violet-300 transition-colors">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Color</label>
            <input type="color" name="color" value="{{ form.color.value|default:'#8B5CF6' }}" class="w-full h-10 border border-[#e8e8e8] cursor-pointer">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Icon (Lucide)</label>
            <input type="text" name="icon" value="{{ form.icon.value|default:'' }}" placeholder="e.g. folder, tag, book" class="w-full px-4 py-2.5 border border-[#e8e8e8] text-[14px] outline-none focus:border-violet-300 transition-colors">
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="px-4 py-2.5 bg-indigo-500 hover:bg-indigo-600 rounded-[20px] text-white shadow-[0_2px_2px_rgba(0,0,0,0.25)] text-[14px] font-medium transition-colors">
                Save
            </button>
            <a href="{% url 'library:category_list' %}" class="px-4 py-2.5 text-[#666] bg-gray-100 hover:bg-gray-200 transition-colors text-[14px] rounded-[20px]">
                Cancel
            </a>
        </div>
    </form>
</div>
