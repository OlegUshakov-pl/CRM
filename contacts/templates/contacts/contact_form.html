<form method="post" action="{% if contact %}{% url 'contacts:contact_edit' contact.slug %}{% else %}{% url 'contacts:contact_create' %}{% endif %}" enctype="multipart/form-data" class="space-y-4">
    {% csrf_token %}
    {% for field in form %}
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <p class="mt-1 text-sm text-red-600 dark:text-red-400">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
    {% endfor %}
    <div class="flex gap-3 pt-2">
        <button type="submit" class="px-4 py-2.5 bg-green-100 dark:bg-green-900/30 text-[14px] font-medium transition-colors">
            {% if contact %}Save Changes{% else %}Create{% endif %}
        </button>
        <button type="button" @click="closeSlideOver()" class="px-4 py-2.5 text-[#666] bg-gray-100 hover:bg-gray-200 transition-colors text-[14px]">Cancel</button>
    </div>
</form>
