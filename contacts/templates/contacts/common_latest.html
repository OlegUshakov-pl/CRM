{% if contacts %}
<div class="space-y-3">
    {% for contact in contacts %}
    <div class="flex items-center gap-3 group">
        <div class="w-8 h-8 bg-indigo-100 dark:bg-indigo-900/50 rounded-full flex items-center justify-center flex-shrink-0">
            <span class="text-xs font-semibold text-indigo-700 dark:text-indigo-300">{{ contact.first_name|first }}{{ contact.last_name|first }}</span>
        </div>
        <div>
            <p class="text-sm font-medium text-gray-900 dark:text-white">{{ contact.get_full_name }}</p>
            <p class="text-xs text-gray-500 dark:text-gray-400">{{ contact.position|default:contact.email }}</p>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<p class="text-gray-500 dark:text-gray-400 text-center py-4">No contacts yet.</p>
{% endif %}
