<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Project</title>

        <!-- Tailwind -->
        <script src="https://cdn.tailwindcss.com"></script>

        <!-- Montserrat -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />

        <!-- Lucide -->
        <script src="https://unpkg.com/lucide@latest"></script>

        <style>
            body {
                font-family: "Montserrat", sans-serif;
                background: #f5f5f5;
                color: #222;
            }

            .border-light {
                border-color: #e8e8e8;
            }

            .text-soft {
                color: #8d8d8d;
            }

            .purple {
                color: #8b7cf8;
            }

            .table-row {
                background: #f8f8f8;
            }

            nav a {
                padding-top: 5px;
                padding-bottom: 5px;
            }

            nav a:hover {
                background: #efefef;
                border-radius: 4px;
            }

            #sidebar.collapsed {
                width: 60px;
                padding-left: 12px;
                padding-right: 12px;
            }

            #sidebar.collapsed .sidebar-text {
                display: none;
            }

            #sidebar.collapsed .flex.items-center.gap-2.mb-7 span {
                display: none;
            }

            #sidebar.collapsed nav a {
                justify-content: center;
                padding-left: 8px;
                padding-right: 8px;
            }

            #sidebar.collapsed nav a .sidebar-text {
                display: none;
            }

            #sidebar.collapsed .flex.items-center.gap-2.mb-7 {
                justify-content: center;
            }

            #sidebar.collapsed button {
                justify-content: center;
            }
        </style>
    </head>
    <body>
        <div class="max-w-[1280px] mx-auto py-6 px-4 flex gap-5">
            <!-- Sidebar -->
            <aside
                id="sidebar"
                class="w-[210px] bg-white border border-light min-h-[900px] px-5 py-5 flex flex-col transition-all duration-300"
            >
                <div class="flex items-center gap-2 mb-7">
                    <div class="w-4 h-4 rounded bg-violet-400 flex-shrink-0"></div>
                    <span class="sidebar-text text-[12px] font-semibold tracking-wide">CRM</span>
                </div>

                <nav class="space-y-3 text-[13px] flex-1">
                    <a class="flex items-center gap-2 font-medium" href="#">
                        <i data-lucide="layout-dashboard" class="w-4 h-4 flex-shrink-0"></i>
                        <span class="sidebar-text">Dashboard</span>
                    </a>

                    <a class="flex items-center gap-2" href="#">
                        <i data-lucide="factory" class="w-4 h-4 flex-shrink-0"></i>
                        <span class="sidebar-text">Industry</span>
                    </a>

                    <a class="flex items-center gap-2" href="#">
                        <i data-lucide="briefcase" class="w-4 h-4 flex-shrink-0"></i>
                        <span class="sidebar-text">Projects</span>
                    </a>

                    <a class="flex items-center gap-2" href="#">
                        <i data-lucide="package" class="w-4 h-4 flex-shrink-0"></i>
                        <span class="sidebar-text">Materials</span>
                    </a>

                    <a class="flex items-center gap-2" href="#">
                        <i data-lucide="library" class="w-4 h-4 flex-shrink-0"></i>
                        <span class="sidebar-text">Library</span>
                    </a>

                    <div class="pt-5 space-y-3">
                        <a class="flex items-center gap-2" href="#">
                            <i data-lucide="building-2" class="w-4 h-4 flex-shrink-0"></i>
                            <span class="sidebar-text">Companies</span>
                        </a>

                        <a class="flex items-center gap-2" href="#">
                            <i data-lucide="contact" class="w-4 h-4 flex-shrink-0"></i>
                            <span class="sidebar-text">Contacts</span>
                        </a>

                        <a class="flex items-center gap-2" href="#">
                            <i data-lucide="notebook-pen" class="w-4 h-4 flex-shrink-0"></i>
                            <span class="sidebar-text">Notes</span>
                        </a>
                    </div>

                    <button
                        id="sidebar-toggle-btn"
                        onclick="toggleSidebar()"
                        class="p-2 hover:bg-gray-100 rounded flex items-center gap-2 mt-4 pl-0"
                    >
                        <i
                            data-lucide="panel-left-close"
                            id="toggle-icon"
                            class="w-4 h-4 flex-shrink-0"
                        ></i>
                    </button>
                </nav>
            </aside>

            <!-- Main -->
            <main class="flex-1 bg-white border border-light">
                <!-- Header -->
                <div class="border-b border-light px-6 py-4 flex items-center justify-between">
                    <div class="flex items-center gap-3 text-[12px] text-soft">
                        <i data-lucide="house" class="w-3 h-3"></i>
                        <span>/</span>
                        <span>MAIN</span>
                        <span>/</span>
                        <span>Industry</span>
                        <span>/</span>
                        <span class="purple font-medium">Project</span>
                        <span>/</span>
                        <span>XXX-XXX-XXX</span>
                    </div>

                    <div class="flex items-center gap-3 text-[12px]" style="color: #222222">
                        <button class="p-2 hover:bg-gray-100">
                            <svg
                                class="w-5 h-5"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
                                ></path>
                            </svg>
                        </button>
                        <div class="flex items-center gap-2">
                            <span class="font-semibold">John Doe</span>
                            <div class="w-8 h-8 bg-gray-300 flex items-center justify-center">
                                <svg
                                    class="w-5 h-5"
                                    fill="none"
                                    stroke="currentColor"
                                    viewBox="0 0 24 24"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        stroke-width="2"
                                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                                    ></path>
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Search -->
                <div class="px-6 py-5 border-b border-light">
                    <div
                        class="border border-light rounded-sm h-[120px] flex items-start justify-between px-4 pt-3 text-soft text-[12px]"
                    >
                        <span>What would you like to know?</span>

                        <div class="flex items-center gap-4">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                            <i data-lucide="mic" class="w-4 h-4"></i>
                            <i data-lucide="arrow-up-circle" class="w-4 h-4"></i>
                        </div>
                    </div>
                </div>

                <!-- Content -->
                <div class="px-10 py-7"></div>
            </main>
        </div>

        <script>
            lucide.createIcons();

            function toggleSidebar() {
                const sidebar = document.getElementById("sidebar");
                const icon = document.getElementById("toggle-icon");
                const btn = document.getElementById("sidebar-toggle-btn");
                sidebar.classList.toggle("collapsed");

                if (sidebar.classList.contains("collapsed")) {
                    icon.setAttribute("data-lucide", "panel-left-open");
                    btn.classList.remove("pl-0");
                } else {
                    icon.setAttribute("data-lucide", "panel-left-close");
                    btn.classList.add("pl-0");
                }
                lucide.createIcons();
            }

            let currentSlide = 0;
            const totalSlides = 4;

            function updateSlider() {
                document.getElementById("slider-track").style.transform =
                    `translateX(-${currentSlide * 100}%)`;
                document.querySelectorAll("#slider-dots button").forEach((dot, i) => {
                    dot.className = `w-2 h-2 rounded-full ${i === currentSlide ? "bg-violet-400" : "bg-gray-300"}`;
                });
            }

            function nextSlide() {
                currentSlide = (currentSlide + 1) % totalSlides;
                updateSlider();
            }

            function prevSlide() {
                currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
                updateSlider();
            }

            function goToSlide(index) {
                currentSlide = index;
                updateSlider();
            }
        </script>
    </body>
</html>
