{% if documents %}
<div class="space-y-2">
    {% for doc in documents %}
    <div class="p-3 rounded-lg bg-gray-50 dark:bg-gray-700/30">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-gray-100 dark:bg-gray-700 rounded flex items-center justify-center flex-shrink-0">
                <span class="text-xs font-semibold text-gray-500 dark:text-gray-400">D</span>
            </div>
            <div class="flex-1 min-w-0">
                <p class="font-medium text-gray-900 dark:text-white">{{ doc.title }}</p>
                <p class="text-xs text-gray-500 dark:text-gray-400">{{ doc.project.name|default:'No project' }}</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<p class="text-gray-500 dark:text-gray-400 text-center py-6">No documents yet.</p>
{% endif %}
