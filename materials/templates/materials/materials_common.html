{% extends 'base.html' %}
{% block title %}Materials - CRM{% endblock %}

        <div>
            <h1 class="text-2xl font-bold text-gray-900">Materials</h1>
        </div>

    {% include 'materials/partials/material_list_content.html' %}

{% endblock %}
