{% load static %}
<div class="flex items-center justify-between p-6 border-b border-[#e8e8e8]">
    <h2 class="text-lg font-semibold text-gray-900">{{ title }}</h2>
    <button onclick="closeSlideOver()" class="p-1 text-gray-400 hover:text-gray-600 transition-colors">
        <i data-lucide="x" class="w-5 h-5"></i>
    </button>
</div>

<form hx-post="{% if material %}{% url 'materials:edit' material.slug %}{% else %}{% url 'materials:create' project.slug %}{% endif %}"
      hx-target="#slide-over-content"
      hx-swap="innerHTML"
      class="p-6 space-y-4">
    {% csrf_token %}
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Project</label>
        <select name="project" class="w-full px-4 py-2.5 border border-[#e8e8e8] text-[14px] outline-none focus:border-violet-300 transition-colors">
            {% for p in projects %}
                <option value="{{ p.id }}" {% if project.id == p.id %}selected{% endif %}>{{ p.name }}</option>
            {% endfor %}
        </select>
    </div>
    {% for field in form %}
        {% if field.name != 'project' %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <p class="mt-1 text-sm text-red-600">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endif %}
    {% endfor %}
    <div class="flex items-center justify-between gap-3 pt-4 border-t border-[#e8e8e8]">
        <button type="submit" class="px-4 py-2.5 bg-green-500 hover:bg-green-600 rounded-[20px] text-white shadow-[0_2px_2px_rgba(0,0,0,0.25)] text-[14px] font-medium transition-colors">Save</button>
        <button type="button" onclick="closeSlideOver()" class="px-4 py-2.5 text-[#666] bg-gray-100 hover:bg-gray-200 text-[14px] transition-colors">Cancel</button>
    </div>
</form>
