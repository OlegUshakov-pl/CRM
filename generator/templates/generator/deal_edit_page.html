{% extends 'base.html' %}
{% block title %}Edit Deal - CRM{% endblock %}
{% block breadcrumb %}Edit Deal{% endblock %}
{% block content %}
<div class="max-w-2xl">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">Edit Deal</h1>
    <form method="post" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p class="mt-1 text-sm text-red-600 dark:text-red-400">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}
        <div class="flex gap-3 pt-2">
            <button type="submit" class="px-4 py-2.5 bg-green-500 hover:bg-green-600 rounded-[20px] text-white shadow-[0_2px_2px_rgba(0,0,0,0.25)] text-[14px] font-medium transition-colors">Save Changes</button>
            <a href="{% url 'generators:detail' deal.slug %}" class="px-4 py-2.5 text-[#666] bg-gray-100 hover:bg-gray-200 transition-colors text-[14px]">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
