<div class="relative" x-data="{ open: false }">
    <button @click="open = !open" class="flex items-center gap-2 px-3 py-2 border border-[#e8e8e8] text-sm text-gray-600 hover:bg-gray-50 transition-colors bg-white">
        <i data-lucide="arrow-up-down" class="w-4 h-4"></i>
        <span>{{ current_sort_label|default:'Sort' }}</span>
        <i data-lucide="chevron-down" class="w-3 h-3"></i>
    </button>
    <div x-show="open" @click.outside="open = false" class="absolute right-0 mt-1 w-44 bg-white border border-[#e8e8e8] shadow-lg z-50 py-1" x-cloak>
        {% for field, label in sort_options %}
        <a href="?sort={{ field }}{% if current_sort == field and current_order == 'asc' %}&order=desc{% else %}&order=asc{% endif %}{% if query %}&q={{ query }}{% endif %}{% if current_category %}&category={{ current_category }}{% endif %}{% if current_page %}&page={{ current_page }}{% endif %}"
           class="flex items-center justify-between px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
            <span>{{ label }}</span>
            {% if current_sort == field %}
            <i data-lucide="{% if current_order == 'asc' %}arrow-up{% else %}arrow-down{% endif %}" class="w-3.5 h-3.5 text-indigo-600"></i>
            {% endif %}
        </a>
        {% endfor %}
    </div>
</div>
