{% load static %}
<div id="ai-chat-root" x-data="aiChat()" x-init="init()" x-cloak
     style="height:200px; resize:vertical; overflow:hidden; min-height:120px; max-height:80vh;"
     class="border border-light dark:border-[#222] bg-white dark:bg-[#0a0a0a] flex flex-col">

    <!-- Header -->
    <div class="flex items-center justify-between px-4 py-2 border-b border-light dark:border-[#222] flex-shrink-0">
        <div class="flex items-center gap-2">
            <div class="w-7 h-7 rounded-full bg-indigo-400 text-white flex items-center justify-center">
                <i data-lucide="sparkles" class="w-3.5 h-3.5"></i>
            </div>
            <div>
                <p class="text-sm font-semibold text-gray-900 dark:text-white">AI Assistant</p>
                <p class="text-[11px] text-gray-500 dark:text-gray-400" x-text="storageInfo"></p>
            </div>
        </div>
        <div class="flex items-center gap-1">
            <button @click="showClearModal = true" title="Clear"
                    class="p-1.5 hover:bg-gray-100 dark:hover:bg-[#1a1a1a] rounded">
                <i data-lucide="trash-2" class="w-4 h-4 text-gray-500"></i>
            </button>
        </div>
    </div>

    <!-- Messages -->
    <div class="flex-1 overflow-y-auto p-2 space-y-1.5" id="ai-chat-messages">
        <template x-for="m in messages" :key="m.id">
            <div :class="m.role === 'user' ? 'flex justify-end' : 'flex justify-start'">
                <div :class="m.role === 'user'
                            ? 'max-w-[85%] bg-indigo-600 text-white px-2.5 py-1.5 rounded-lg text-[12px] whitespace-pre-wrap'
                            : 'max-w-[90%] bg-gray-100 dark:bg-[#1a1a1a] text-gray-900 dark:text-gray-100 px-2.5 py-1.5 rounded-lg text-[12px] whitespace-pre-wrap'">
                    <p x-text="m.content"></p>
                    <template x-if="m.payload && m.payload.needs_confirmation">
                        <div class="mt-2 flex gap-2">
                            <button @click="confirm(m)"
                                    class="px-2 py-1 text-[11px] bg-emerald-600 hover:bg-emerald-700 text-white rounded"
                                    x-text="confirmLabel"></button>
                            <button @click="cancelConfirm()"
                                    class="px-2 py-1 text-[11px] bg-gray-200 dark:bg-[#222] rounded"
                                    x-text="cancelLabel"></button>
                        </div>
                    </template>
                    <template x-if="m.payload && m.payload.actions && m.payload.actions.length">
                        <div class="mt-2 flex flex-wrap gap-2">
                            <template x-for="(a,i) in m.payload.actions" :key="i">
                                <a :href="a.url || '#'" target="_blank"
                                   class="px-2 py-1 text-[11px] bg-indigo-100 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-200 rounded">
                                    <span x-text="a.label"></span>
                                </a>
                            </template>
                        </div>
                    </template>
                    <template x-if="m.payload && m.payload.undoable && m.payload.undo_token">
                        <div class="mt-2">
                            <button @click="undo(m.payload.undo_token, m.id)"
                                    :id="'undo-' + m.id"
                                    class="px-2 py-1 text-[11px] bg-amber-100 dark:bg-amber-900/30 text-amber-800 dark:text-amber-200 rounded">
                                <i data-lucide="rotate-ccw" class="w-3 h-3 inline"></i>
                                <span x-text="undoLabel"></span> (<span :id="'undo-timer-' + m.id">10</span><span x-text="sUnit"></span>)
                            </button>
                        </div>
                    </template>
                    <template x-if="m.payload && m.payload.payload && m.payload.payload.drawings">
                        <div class="mt-2 space-y-1">
                            <template x-for="(d,i) in m.payload.payload.drawings" :key="i">
                                <div class="px-2 py-1 bg-white dark:bg-[#111] border border-light dark:border-[#222] rounded text-[12px] flex items-center justify-between">
                                    <span>
                                        <strong x-text="d.number || '—'"></strong>
                                        <span class="text-gray-500" x-text="' • ' + (d.category || '')"></span>
                                    </span>
                                    <a :href="d.file_url" target="_blank" class="text-indigo-600 hover:underline">&#8599;</a>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template x-if="m.payload && m.payload.payload && m.payload.payload.phone">
                        <div class="mt-2 text-[12px] space-y-1 text-gray-700 dark:text-gray-300">
                            <p><span x-text="m.payload.payload.phone"></span></p>
                            <p><span x-text="m.payload.payload.email"></span></p>
                            <p><span x-text="m.payload.payload.company"></span></p>
                        </div>
                    </template>
                </div>
            </div>
        </template>
        <div x-show="loading" class="flex justify-start">
            <div class="bg-gray-100 dark:bg-[#1a1a1a] px-2.5 py-1.5 rounded-lg text-[12px] text-gray-500">
                <span x-text="loadingText"></span>
            </div>
        </div>
    </div>

    <!-- Browser panel -->
    <div x-show="browserOpen" class="border-t border-light dark:border-[#222] p-3 bg-gray-50 dark:bg-[#111]">
        <div class="flex items-center justify-between mb-2">
            <span class="text-[12px] text-gray-500" x-text="previewLabel + browserUrl"></span>
            <div class="flex items-center gap-1">
                <a :href="browserUrl" target="_blank" class="px-2 py-1 text-[12px] bg-white dark:bg-[#222] rounded border border-light dark:border-[#222]">
                    <i data-lucide="external-link" class="w-3 h-3 inline"></i> Open
                </a>
                <a :href="browserImage" download class="px-2 py-1 text-[12px] bg-white dark:bg-[#222] rounded border border-light dark:border-[#222]">
                    <i data-lucide="download" class="w-3 h-3 inline"></i> Screenshot
                </a>
                <button @click="browserOpen=false" class="px-2 py-1 text-[12px] bg-white dark:bg-[#222] rounded border border-light dark:border-[#222]">
                    <i data-lucide="x" class="w-3 h-3 inline"></i> Close
                </button>
            </div>
        </div>
        <div class="bg-white dark:bg-black border border-light dark:border-[#222] rounded overflow-hidden">
            <img :src="browserImage" alt="preview" class="w-full h-auto block">
        </div>
    </div>

    <!-- Input -->
    <div class="border-t border-light dark:border-[#222] p-2 flex-shrink-0">
        <div class="flex items-end gap-2">
            <!-- Model selector -->
            <div class="relative flex-shrink-0" x-data="{ modelsOpen: false }">
                <button @click="modelsOpen = !modelsOpen; if(modelsOpen) loadModels()"
                        class="px-2 py-2 text-[11px] bg-gray-100 dark:bg-[#1a1a1a] border border-light dark:border-[#222] rounded hover:bg-gray-200 dark:hover:bg-[#222] text-gray-700 dark:text-gray-300 flex items-center gap-1 whitespace-nowrap">
                    <i data-lucide="cpu" class="w-3.5 h-3.5"></i>
                    <span x-text="currentModel || 'model'"></span>
                    <i data-lucide="chevron-down" class="w-3 h-3"></i>
                </button>
                <div x-show="modelsOpen" @click.outside="modelsOpen = false"
                     class="absolute bottom-full left-0 mb-1 w-56 bg-white dark:bg-black border border-light dark:border-[#222] rounded shadow-lg z-50 max-h-48 overflow-y-auto">
                    <div x-show="modelsLoading" class="px-3 py-2 text-[12px] text-gray-400">Loading...</div>
                    <template x-if="models.length === 0 && !modelsLoading">
                        <div class="px-3 py-2 text-[12px] text-gray-400">No models found</div>
                    </template>
                    <template x-for="m in models" :key="m">
                        <button @click="setModel(m); modelsOpen = false"
                                :class="m === currentModel ? 'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300' : 'text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-[#1a1a1a]'"
                                class="w-full text-left px-3 py-2 text-[12px] flex items-center gap-2 transition-colors">
                            <i data-lucide="check" class="w-3 h-3" x-show="m === currentModel"></i>
                            <span x-text="m"></span>
                        </button>
                    </template>
                </div>
            </div>

            <textarea x-ref="input" x-model="text" @keydown.enter.prevent="if(!$event.shiftKey) send()"
                      rows="1" :placeholder="placeholder"
                      class="flex-1 resize-none border border-light dark:border-[#222] dark:bg-[#111] dark:text-white text-[13px] px-3 py-2 rounded outline-none focus:border-indigo-400 max-h-32"></textarea>
            <!-- Mode selector -->
            <div class="relative flex-shrink-0" x-data="{ modeOpen: false }">
                <button @click="modeOpen = !modeOpen"
                        class="px-2 py-2 text-[11px] bg-gray-100 dark:bg-[#1a1a1a] border border-light dark:border-[#222] rounded hover:bg-gray-200 dark:hover:bg-[#222] text-gray-700 dark:text-gray-300 flex items-center gap-1 whitespace-nowrap">
                    <i data-lucide="message-square" class="w-3.5 h-3.5" x-show="mode === 'chat'"></i>
                    <i data-lucide="terminal" class="w-3.5 h-3.5" x-show="mode === 'commands'"></i>
                    <span x-text="mode === 'chat' ? 'CHAT' : 'COMMANDS'"></span>
                    <i data-lucide="chevron-down" class="w-3 h-3"></i>
                </button>
                <div x-show="modeOpen" @click.outside="modeOpen = false"
                     class="absolute bottom-full right-0 mb-1 w-36 bg-white dark:bg-black border border-light dark:border-[#222] rounded shadow-lg z-50">
                    <button @click="setMode('chat'); modeOpen = false"
                            :class="mode === 'chat' ? 'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300' : 'text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-[#1a1a1a]'"
                            class="w-full text-left px-3 py-2 text-[12px] flex items-center gap-2 transition-colors">
                        <i data-lucide="message-square" class="w-3 h-3"></i> Chat
                    </button>
                    <button @click="setMode('commands'); modeOpen = false"
                            :class="mode === 'commands' ? 'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300' : 'text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-[#1a1a1a]'"
                            class="w-full text-left px-3 py-2 text-[12px] flex items-center gap-2 transition-colors">
                        <i data-lucide="terminal" class="w-3 h-3"></i> Commands
                    </button>
                </div>
            </div>
            <button @click="toggleSpeech()" :class="speechRecording ? 'text-red-500 animate-pulse' : 'text-gray-400 hover:text-indigo-600'"
                    class="p-2" :title="speechRecording ? 'Stop recording' : 'Voice input'">
                <i data-lucide="mic" class="w-5 h-5"></i>
            </button>
            <button @click="send()" :disabled="!text.trim() || loading"
                    class="p-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded disabled:opacity-50">
                <i data-lucide="send" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <!-- Clear chat modal -->
    <div x-show="showClearModal" x-cloak class="fixed inset-0 z-[60] flex items-center justify-center">
        <div @click="showClearModal = false" class="fixed inset-0 bg-black/50"></div>
        <div class="bg-white dark:bg-black rounded-lg shadow-xl z-10 max-w-sm w-full mx-4 p-6 relative" @click.outside="showClearModal = false">
            <div class="flex items-start gap-4">
                <div class="w-10 h-10 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center flex-shrink-0 mt-0.5">
                    <i data-lucide="trash-2" class="w-5 h-5 text-red-600"></i>
                </div>
                <div class="flex-1">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Clear chat?</h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1" x-text="clearConfirmText"></p>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button @click="showClearModal = false"
                        class="px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-[#1a1a1a] hover:bg-gray-200 dark:hover:bg-[#222] transition-colors">
                    <span x-text="cancelLabel"></span>
                </button>
                <button @click="doClear()"
                        class="px-4 py-2 text-sm font-medium text-white bg-red-500 hover:bg-red-600 transition-colors">
                    <span x-text="clearLabel"></span>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
var LABELS = {
    placeholder: 'What are you looking for?',
    thinking: 'Thinking...',
    executing: 'Executing...',
    clearConfirm: 'Clear chat history?',
    clearBtn: 'Clear',
    voiceTooltip: 'Voice control will be added in the next release (v2).',
    micTitle: 'Voice (coming soon)',
    previewLabel: 'Preview: ',
    confirmLabel: 'Confirm',
    cancelLabel: 'Cancel',
    undoLabel: 'Undo',
    sUnit: 's',
    storageInfo: function(u, total, pct) { return 'AI Files: ' + u + ' / ' + total + ' (' + pct + '%)'; },
    errorPrefix: 'Error: ',
    confirmMsg: 'Confirm',
    cancelled: 'Action cancelled.',
    undid: 'Undone.',
    undoFailed: 'Could not undo.',
};
function aiChat() {
    return {
        open: true,
        wide: false,
        text: '',
        messages: [],
        loading: false,
        storageInfo: '',
        browserOpen: false,
        browserUrl: '',
        browserImage: '',
        undoTimers: {},
        showClearModal: false,
        models: [],
        modelsLoading: false,
        currentModel: localStorage.getItem('ollama_model') || '',
        mode: localStorage.getItem('ai_mode') || 'chat',
        init: function() {
            this.updatePlaceholder();
            this.loadingText = LABELS.thinking;
            this.micTitle = LABELS.micTitle;
            this.previewLabel = LABELS.previewLabel;
            this.confirmLabel = LABELS.confirmLabel;
            this.cancelLabel = LABELS.cancelLabel;
            this.undoLabel = LABELS.undoLabel;
            this.sUnit = LABELS.sUnit;
            this.clearConfirmText = LABELS.clearConfirm;
            this.clearLabel = LABELS.clearBtn;
            this.refresh();
            this.loadModels();
        },
        updatePlaceholder: function() {
            this.placeholder = this.mode === 'commands' ? 'Type a command...' : LABELS.placeholder;
        },
        setMode: function(m) {
            this.mode = m;
            localStorage.setItem('ai_mode', m);
            this.updatePlaceholder();
        },
        speechRecording: false,
        speechRecognition: null,
        toggleSpeech: function() {
            var self = this;
            if (this.speechRecording) {
                if (this.speechRecognition) this.speechRecognition.stop();
                this.speechRecording = false;
                return;
            }
            var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert('Speech recognition is not supported in this browser.');
                return;
            }
            var rec = new SpeechRecognition();
            rec.lang = 'en-US';
            rec.interimResults = true;
            rec.continuous = false;
            rec.onresult = function(event) {
                var transcript = '';
                for (var i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                self.text = transcript;
            };
            rec.onend = function() {
                self.speechRecording = false;
                if (self.text.trim()) {
                    self.messages.push({
                        id: 'voice-' + Date.now(),
                        role: 'user',
                        content: self.text.trim(),
                        payload: {},
                        created_at: new Date().toISOString()
                    });
                    var msg = self.text.trim();
                    self.text = '';
                    self.loading = true;
                    self.loadingText = LABELS.thinking;
                    self.scrollDown();
                    fetch('{% url "assistant:chat" %}', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json', 'X-CSRFToken': self.getCSRFToken()},
                        body: JSON.stringify({message: msg, model: self.currentModel, mode: self.mode})
                    })
                    .then(function(r) { return r.json(); })
                    .then(function(data) { self.handleResponse(data); })
                    .catch(function(e) {
                        self.messages.push({id: 'err-'+Date.now(), role: 'assistant', content: LABELS.errorPrefix + e, payload: {}});
                    })
                    .finally(function() {
                        self.loading = false;
                        self.scrollDown();
                    });
                }
            };
            rec.onerror = function(event) {
                self.speechRecording = false;
                if (event.error !== 'no-speech') {
                    self.messages.push({id: 'err-'+Date.now(), role: 'assistant', content: LABELS.errorPrefix + event.error, payload: {}});
                    self.scrollDown();
                }
            };
            this.speechRecognition = rec;
            this.speechRecording = true;
            rec.start();
        },
        getCSRFToken: function() {
            var c = document.cookie.split(';');
            for (var i=0;i<c.length;i++){ var x=c[i].trim(); if (x.indexOf('csrftoken=') === 0) return x.substring(10); }
            return '';
        },
        refresh: function() {
            var self = this;
            fetch('{% url "assistant:panel_state" %}')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    self.messages = data.messages || [];
                    self.updateStorage(data.storage_used, data.storage_quota);
                    self.$nextTick(function() { if (window.lucide) lucide.createIcons(); self.scrollDown(); });
                })
                .catch(function() {});
        },
        updateStorage: function(used, quota) {
            if (typeof used !== 'number' || !quota) return;
            var pct = Math.round(used / quota * 100);
            this.storageInfo = LABELS.storageInfo(this.fmtSize(used), this.fmtSize(quota), pct);
        },
        fmtSize: function(b) {
            if (b < 1024) return b + ' B';
            if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
            if (b < 1024*1024*1024) return (b/1024/1024).toFixed(1) + ' MB';
            return (b/1024/1024/1024).toFixed(2) + ' GB';
        },
        scrollDown: function() {
            var el = document.getElementById('ai-chat-messages');
            if (el) el.scrollTop = el.scrollHeight;
        },
        loadModels: function() {
            var self = this;
            self.modelsLoading = true;
            fetch('{% url "assistant:ollama_models" %}')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    self.models = data.models || [];
                    if (data.current) self.currentModel = data.current;
                    self.modelsLoading = false;
                    self.$nextTick(function() { if (window.lucide) lucide.createIcons(); });
                })
                .catch(function() {
                    self.models = [];
                    self.modelsLoading = false;
                });
        },
        setModel: function(model) {
            var self = this;
            fetch('{% url "assistant:ollama_set_model" %}', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': this.getCSRFToken()},
                body: JSON.stringify({model: model})
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.ok) {
                    self.currentModel = data.model;
                    localStorage.setItem('ollama_model', data.model);
                }
            })
            .catch(function() {});
        },
        send: function() {
            var msg = this.text.trim();
            if (!msg) return;
            this.text = '';
            this.messages.push({id: 'tmp-' + Date.now(), role: 'user', content: msg, payload: {}, created_at: new Date().toISOString()});
            this.loading = true;
            this.loadingText = LABELS.thinking;
            this.scrollDown();
            var self = this;
            fetch('{% url "assistant:chat" %}', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': this.getCSRFToken()},
                body: JSON.stringify({message: msg, model: this.currentModel, mode: this.mode})
            })
            .then(function(r) { return r.json(); })
            .then(function(data) { self.handleResponse(data); })
            .catch(function(e) {
                self.messages.push({id: 'err-'+Date.now(), role: 'assistant', content: LABELS.errorPrefix + e, payload: {}});
            })
            .finally(function() {
                self.loading = false;
                self.scrollDown();
            });
        },
        confirm: function(msg) {
            this.messages.push({id: 'tmp-conf-'+Date.now(), role: 'user', content: LABELS.confirmMsg, payload: {}, created_at: new Date().toISOString()});
            this.loading = true;
            this.loadingText = LABELS.executing;
            var self = this;
            fetch('{% url "assistant:chat" %}', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': this.getCSRFToken()},
                body: JSON.stringify({message: 'confirm', confirm: true, confirm_token: msg.id})
            })
            .then(function(r) { return r.json(); })
            .then(function(data) { self.handleResponse(data); })
            .catch(function(e) {
                self.messages.push({id: 'err-'+Date.now(), role: 'assistant', content: LABELS.errorPrefix + e, payload: {}});
            })
            .finally(function() {
                self.loading = false;
                self.scrollDown();
            });
        },
        cancelConfirm: function() {
            this.messages.push({id: 'tmp-cancel-'+Date.now(), role: 'assistant', content: LABELS.cancelled, payload: {}});
        },
        undo: function(token, msgId) {
            var btn = document.getElementById('undo-' + msgId);
            if (btn) btn.disabled = true;
            var self = this;
            fetch('{% url "assistant:chat" %}', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': this.getCSRFToken()},
                body: JSON.stringify({undo_token: token})
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                self.messages.push({id: 'undo-'+Date.now(), role: 'assistant', content: data.message || (data.ok ? LABELS.undid : LABELS.undoFailed), payload: {}});
            })
            .catch(function(e) {
                self.messages.push({id: 'err-'+Date.now(), role: 'assistant', content: LABELS.errorPrefix + e, payload: {}});
            });
            this.scrollDown();
        },
        handleResponse: function(data) {
            if (data.message) {
                var payload = {
                    needs_confirmation: data.needs_confirmation,
                    confirmation_text: data.confirmation_text,
                    actions: data.actions || [],
                    undoable: data.undoable,
                    undo_token: data.undo_token,
                    payload: data.payload || {}
                };
                this.messages.push({
                    id: data.message_id || ('srv-'+Date.now()),
                    role: 'assistant',
                    content: data.message,
                    payload: payload,
                    created_at: new Date().toISOString()
                });
                if (data.undoable && data.undo_token && data.message_id) {
                    this.startUndoTimer(data.message_id);
                }
            }
            if (data.payload && data.payload.url) {
                this.openBrowser(data.payload.url);
            }
            this.$nextTick(function() { if (window.lucide) lucide.createIcons(); });
            this.scrollDown();
        },
        startUndoTimer: function(msgId) {
            var n = 10;
            var el = document.getElementById('undo-timer-' + msgId);
            var self = this;
            this.undoTimers[msgId] = setInterval(function(){
                n--;
                if (el) el.textContent = n;
                if (n <= 0) {
                    clearInterval(self.undoTimers[msgId]);
                    var btn = document.getElementById('undo-' + msgId);
                    if (btn) btn.disabled = true;
                }
            }, 1000);
        },
        doClear: function() {
            var self = this;
            fetch('{% url "assistant:clear_chat" %}', {
                method: 'POST', headers: {'X-CSRFToken': this.getCSRFToken()}
            }).then(function() {
                self.messages = [];
                self.showClearModal = false;
            });
        },
        openBrowser: function(url) {
            this.wide = false;
            this.browserOpen = true;
            this.browserUrl = url;
            var self = this;
            fetch('{% url "assistant:browser_preview" %}?url=' + encodeURIComponent(url))
                .then(function(r) { return r.json(); })
                .then(function(d) { if (d.ok) self.browserImage = d.image_url; })
                .catch(function() { self.browserImage = ''; });
        }
    }
}
</script>
