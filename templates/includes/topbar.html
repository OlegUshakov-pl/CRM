<header class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-20">
    <div class="flex items-center gap-4">
        <button @click="mobileSidebarOpen = !mobileSidebarOpen" class="lg:hidden text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
        <div class="relative hidden sm:block">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
            <input type="text" placeholder="Search..." class="pl-10 pr-4 py-2 bg-gray-100 dark:bg-gray-700 border-0 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none w-64 dark:text-gray-200 dark:placeholder-gray-400">
        </div>
    </div>

    <div class="flex items-center gap-3">
        <button @click="toggleTheme()" class="p-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
            <template x-if="theme === 'dark'">
                <i data-lucide="sun" class="w-5 h-5"></i>
            </template>
            <template x-if="theme !== 'dark'">
                <i data-lucide="moon" class="w-5 h-5"></i>
            </template>
        </button>

        <div class="relative" x-data="{ open: false }">
            <button @click="open = !open" class="flex items-center gap-2 p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
                <div class="w-8 h-8 bg-indigo-100 dark:bg-indigo-900/50 rounded-full flex items-center justify-center">
                    <span class="text-sm font-semibold text-indigo-700 dark:text-indigo-300">{{ user.get_initials }}</span>
                </div>
                <span class="text-sm font-medium text-gray-700 dark:text-gray-300 hidden sm:block">{{ user.get_short_name|default:user.username }}</span>
                <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400"></i>
            </button>
            <div x-show="open" @click.outside="open = false" class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 py-1 z-50">
                <a href="{% url 'accounts:profile' %}" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i data-lucide="user" class="w-4 h-4"></i>
                    Profile
                </a>
                <hr class="border-gray-200 dark:border-gray-700">
                <a href="{% url 'accounts:logout' %}" class="flex items-center gap-2 px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    Log out
                </a>
            </div>
        </div>
    </div>
</header>
