{% if tasks %}
<div class="space-y-2">
    {% for task in tasks %}
    <div class="p-3 rounded-lg bg-gray-50 dark:bg-gray-700/30">
        <div class="flex items-center gap-3">
            <div class="w-4 h-4 rounded-full border-2 flex-shrink-0 {% if task.priority == 'urgent' %}border-red-400{% elif task.priority == 'high' %}border-orange-400{% elif task.priority == 'medium' %}border-blue-400{% else %}border-gray-400{% endif %}"></div>
            <div class="flex-1 min-w-0">
                <p class="font-medium text-gray-900 dark:text-white">{{ task.title }}</p>
                <p class="text-xs text-gray-500 dark:text-gray-400">{% if task.due_date %}{{ task.due_date|date:'M d' }} · {% endif %}{{ task.get_status_display }}</p>
            </div>
            <span class="text-xs px-2 py-1 rounded-full flex-shrink-0 {% if task.status == 'done' %}bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-300{% elif task.status == 'in_progress' %}bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300{% elif task.status == 'review' %}bg-purple-100 dark:bg-purple-900/30 text-purple-700 dark:text-purple-300{% else %}bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300{% endif %}">{{ task.get_status_display }}</span>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<p class="text-gray-500 dark:text-gray-400 text-center py-6">No tasks yet.</p>
{% endif %}
