{% if notes %}
<div class="space-y-3">
    {% for note in notes %}
    <div class="p-3 bg-gray-50 dark:bg-gray-700/30 rounded-lg">
        <p class="font-medium text-gray-900 dark:text-white">{{ note.title }}</p>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">{{ note.content|truncatewords:30 }}</p>
    </div>
    {% endfor %}
</div>
{% else %}
<p class="text-gray-500 dark:text-gray-400 text-center py-6">No notes yet.</p>
{% endif %}
