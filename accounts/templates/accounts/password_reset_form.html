<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Montserrat", sans-serif; background: #f5f5f5; color: #222; }
    </style>
</head>
<body>
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-md bg-white border border-[#e8e8e8] p-8">
            <div class="text-center mb-8">
                <div class="w-12 h-12 bg-violet-400 rounded flex items-center justify-center mx-auto mb-4">
                    <span class="text-white font-bold text-xl">C</span>
                </div>
                <h1 class="text-xl font-semibold">Reset password</h1>
                <p class="text-[#8d8d8d] text-[13px] mt-1">Enter your email and we'll send you a reset link</p>
            </div>
            <form method="post" class="space-y-4">
                {% csrf_token %}
                {% if form.non_field_errors %}
                    <div class="p-3 bg-red-50 text-red-700 border border-red-200 text-sm">{{ form.non_field_errors.0 }}</div>
                {% endif %}
                <div>
                    <label class="block text-[13px] text-[#8d8d8d] mb-1">Email</label>
                    {{ form.email }}
                    {% if form.email.errors %}<p class="text-red-500 text-xs mt-1">{{ form.email.errors.0 }}</p>{% endif %}
                </div>
                <button type="submit" class="w-full py-2.5 bg-violet-400 hover:opacity-90 text-white font-medium text-[13px] transition-opacity">Send reset link</button>
            </form>
            <div class="text-center mt-6">
                <a href="{% url 'accounts:login' %}" class="text-[13px] text-violet-500 hover:underline">Back to sign in</a>
            </div>
        </div>
    </div>
</body>
</html>
