<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent - CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Montserrat", sans-serif; background: #f5f5f5; color: #222; }
    </style>
</head>
<body>
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-md bg-white border border-[#e8e8e8] p-8 text-center">
            <div class="w-12 h-12 bg-violet-400 rounded flex items-center justify-center mx-auto mb-4">
                <span class="text-white font-bold text-xl">C</span>
            </div>
            <h1 class="text-xl font-semibold mb-2">Check your email</h1>
            <p class="text-[#8d8d8d] text-[13px]">If an account with that email exists, we've sent a password reset link.</p>
            <a href="{% url 'accounts:login' %}" class="inline-block mt-6 text-[13px] text-violet-500 hover:underline">Back to sign in</a>
        </div>
    </div>
</body>
</html>
