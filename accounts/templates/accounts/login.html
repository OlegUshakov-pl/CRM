{% extends 'base.html' %}
{% block title %}Sign In - CRM{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 p-8">
            <div class="text-center mb-8">
                <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center mx-auto mb-4">
                    <span class="text-white font-bold text-xl">C</span>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Welcome back</h1>
                <p class="text-gray-500 dark:text-gray-400 mt-1">Sign in to your CRM account</p>
            </div>
            <form method="post" class="space-y-4">
                {% csrf_token %}
                {% if form.non_field_errors %}
                    <div class="p-3 bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300 rounded-lg text-sm">{{ form.non_field_errors.0 }}</div>
                {% endif %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Username</label>
                    {{ form.username }}
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                    {{ form.password }}
                </div>
                <button type="submit" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg transition-colors">Sign in</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
